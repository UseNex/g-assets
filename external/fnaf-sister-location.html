<!DOCTYPE html>
<html lang="en">

<head>
    <base href="https://cdn.jsdelivr.net/gh/UseNex/g-assets/external/assets/fnaf-sister-location/">
    <link rel="stylesheet" type="text/css" href="style.css"/>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, target-densitydpi=device-dpi" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="HandheldFriendly" content="true" />
    <title>FNAF: Sister Location</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none;overflow:hidden}
        body{background:#000;min-height:100vh;display:flex;justify-content:center;align-items:center}
        
        #slim-loader{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:1px;
            background:rgba(255,255,255,0.08);
            z-index:10001;
            opacity:1;
            transition:opacity 0.3s ease;
        }
        #slim-loader-bar{
            width:0%;
            height:100%;
            background:#fff;
            box-shadow:0 0 4px #fff;
            transition:width 0.08s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        } 
        
        #overlay{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:#000;
            background-image:url('bgstart.webp');
            background-size:cover;
            background-position:center;
            display:flex;
            justify-content:center;
            align-items:center;
            z-index:10000;
            transition:opacity 0.4s ease;
        }
        #overlay::before{
            content:'';
            position:absolute;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.1);
        }
        .loader-center{
            position:relative;
            z-index:1;
            text-align:center;
            background: rgba(0,0,0,0.7);
            border-radius: 10px;
        }
        .percent{
            font-family:system-ui,monospace;
            font-size:48px;
            font-weight:300;
            color:#fff;
            opacity:0.6;
            letter-spacing:2px;
            width:150px;
            height:auto;
            padding:20px;
        }
        .percent small{
            font-size:20px;
            opacity:0.9;
        }
        .status-text{
            font-family:system-ui,monospace;
            font-size:12px;
            color:#aaa;
            text-align:center;
            margin-top:-10px;
            margin-bottom:15px;
            opacity:0;
            transition:opacity 0.3s ease;
            letter-spacing:1px;
        }
        .status-text.show{
            opacity:0.7;
        }
        canvas{display:block}
        .hidden{display:none!important}
    </style>
</head>

<body>
    <div style="display:inline-block;text-align:left">
        <canvas id="MMFCanvas" width="1280" height="720"></canvas>
    </div>
    
    <div id="overlay">
        <div class="loader-center">
            <div class="percent" id="percentDisplay">0<small>%</small></div>
            <div class="status-text" id="statusText">finalizing...</div>
        </div>
    </div>
    <div id="slim-loader"><div id="slim-loader-bar"></div></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        (function(){
            "use strict";
            
            const RUNTIME = "resources/Five Night's at Freddys Sister Location.cch";
            const PARTS = 40;
            const PART_URLS = Array.from({length: PARTS}, (_,i) => `resources.zip.part${i+1}`);
            const CACHE_NAME = 'fnaf-sl-cache-v6';
            const BASE_URL = "https://cdn.jsdelivr.net/gh/UseNex/g-assets/external/assets/fnaf-sister-location/";
            const ABS_PART_URLS = PART_URLS.map(p => BASE_URL + p);
            
            const loaderBar = document.getElementById('slim-loader-bar');
            const overlay = document.getElementById('overlay');
            const percentDisplay = document.getElementById('percentDisplay');
            const statusText = document.getElementById('statusText');
            const resourceCache = new Map();
            let started = false;
            let currentProgress = 0;
            let cacheAvailable = false;
            let extractingComplete = false;
            
            const setProgress = (percent) => {
                if(percent < currentProgress) return;
                currentProgress = Math.min(100, Math.max(0, Math.floor(percent)));
                if(loaderBar) loaderBar.style.width = currentProgress + '%';
                if(percentDisplay) percentDisplay.innerHTML = currentProgress + '<small>%</small>';
                
                if(currentProgress >= 99 && !extractingComplete) {
                    statusText.classList.add('show');
                    const messages = [
                        "unpacking game files...",
                        "loading animatronics...",
                        "warming up circuits...",
                        "checking cameras...",
                        "almost ready..."
                    ];
                    if(!window.statusInterval) {
                        let msgIndex = 0;
                        statusText.textContent = messages[0];
                        window.statusInterval = setInterval(() => {
                            if(extractingComplete) {
                                clearInterval(window.statusInterval);
                                window.statusInterval = null;
                                statusText.style.opacity = '0';
                            } else {
                                msgIndex = (msgIndex + 1) % messages.length;
                                statusText.textContent = messages[msgIndex];
                            }
                        }, 2200);
                    }
                } else if(currentProgress < 99) {
                    statusText.classList.remove('show');
                    if(window.statusInterval) {
                        clearInterval(window.statusInterval);
                        window.statusInterval = null;
                    }
                }
            };
            
            const hideLoader = () => {
                if(window.statusInterval) {
                    clearInterval(window.statusInterval);
                    window.statusInterval = null;
                }
                const slim = document.getElementById('slim-loader');
                if(slim) slim.style.opacity = '0';
                if(overlay) overlay.style.opacity = '0';
                setTimeout(() => {
                    if(slim) slim.classList.add('hidden');
                    if(overlay) overlay.classList.add('hidden');
                }, 400);
            };
            
            const yieldMain = () => new Promise(r => {
                if('requestIdleCallback' in window) requestIdleCallback(() => r(), {timeout: 16});
                else setTimeout(r, 1);
            });
            
            const sleep = (ms) => new Promise(r => setTimeout(r, ms));
            
            const initCache = async () => {
                if(!('caches' in window)) return false;
                try {
                    await caches.open(CACHE_NAME);
                    cacheAvailable = true;
                    return true;
                } catch {
                    return false;
                }
            };
            
            const getCachedResponse = async (url) => {
                if(!cacheAvailable) return null;
                try {
                    const cache = await caches.open(CACHE_NAME);
                    return await cache.match(url);
                } catch {
                    return null;
                }
            };
            
            const cacheResponse = async (url, response) => {
                if(!cacheAvailable) return;
                try {
                    const cache = await caches.open(CACHE_NAME);
                    await cache.put(url, response.clone());
                } catch {}
            };
            
            const getTotalSize = async (urls) => {
                const sizes = await Promise.all(urls.map(async url => {
                    try {
                        const cached = await getCachedResponse(url);
                        if(cached) {
                            const blob = await cached.blob();
                            return blob.size;
                        }
                        const res = await fetch(url, { method: 'HEAD', cache: 'no-cache' });
                        const size = parseInt(res.headers.get('Content-Length') || '0', 10);
                        return size;
                    } catch { return 0; }
                }));
                return sizes.reduce((a,b) => a + b, 0);
            };
            
            const createMergeWorker = () => {
                const workerCode = `
                    self.addEventListener('message', async (e) => {
                        const { urls, taskId, totalSize } = e.data;
                        try {
                            let loaded = 0;
                            const chunks = [];
                            for(let i = 0; i < urls.length; i++) {
                                const res = await fetch(urls[i], { cache: 'no-store' });
                                if(!res.ok) throw new Error('Part ' + (i+1) + ' failed');
                                const reader = res.body.getReader();
                                const buf = [];
                                while(true) {
                                    const {done, value} = await reader.read();
                                    if(done) break;
                                    buf.push(value);
                                    loaded += value.length;
                                    if(totalSize) self.postMessage({ type: 'progress', taskId, percent: (loaded / totalSize) * 100 });
                                    if(buf.length % 40 === 0) await new Promise(r => setTimeout(r, 0));
                                }
                                chunks.push(new Blob(buf));
                            }
                            self.postMessage({ type: 'complete', taskId, blob: new Blob(chunks) });
                        } catch(err) {
                            self.postMessage({ type: 'error', taskId, error: err.message });
                        }
                    });
                `;
                const blob = new Blob([workerCode], { type: 'application/javascript' });
                return new Worker(URL.createObjectURL(blob));
            };
            
            const createExtractWorker = () => {
                const workerCode = `
                    importScripts('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js');
                    self.addEventListener('message', async (e) => {
                        const { zipBlob, taskId, batchSize } = e.data;
                        try {
                            const zip = await JSZip.loadAsync(zipBlob);
                            const files = Object.keys(zip.files).filter(n => !zip.files[n].dir);
                            const total = files.length;
                            const BATCH = batchSize || 2;
                            
                            for(let i = 0; i < files.length; i += BATCH) {
                                const batch = files.slice(i, i + BATCH);
                                const batchResults = [];
                                
                                for(const name of batch) {
                                    const data = await zip.files[name].async('blob');
                                    batchResults.push({ name, data });
                                }
                                
                                self.postMessage({ type: 'batch', taskId, files: batchResults, progress: (Math.min(i + BATCH, total) / total) * 100 });
                                
                                await new Promise(r => setTimeout(r, 8));
                            }
                            
                            self.postMessage({ type: 'complete', taskId });
                        } catch(err) {
                            self.postMessage({ type: 'error', taskId, error: err.message });
                        }
                    });
                `;
                const blob = new Blob([workerCode], { type: 'application/javascript' });
                return new Worker(URL.createObjectURL(blob));
            };
            
            const mergePartsWithWorker = async (urls, onProgress) => {
                const total = await getTotalSize(urls);
                if(total === 0) throw new Error('Size calculation failed');
                
                return new Promise((resolve, reject) => {
                    const worker = createMergeWorker();
                    const taskId = Date.now();
                    const timeout = setTimeout(() => { worker.terminate(); reject(new Error("Merge timeout")); }, 120000);
                    
                    worker.addEventListener('message', (e) => {
                        const { type, taskId: tid, percent, blob, error } = e.data;
                        if(tid !== taskId) return;
                        if(type === 'progress') {
                            onProgress(percent);
                        } else if(type === 'complete') {
                            clearTimeout(timeout);
                            worker.terminate();
                            resolve(blob);
                        } else if(type === 'error') {
                            clearTimeout(timeout);
                            worker.terminate();
                            reject(new Error(error));
                        }
                    });
                    
                    worker.postMessage({ urls, taskId, totalSize: total });
                });
            };
            
            const extractZipWithWorker = async (blob, startPercent) => {
                return new Promise((resolve, reject) => {
                    const worker = createExtractWorker();
                    const taskId = Date.now();
                    const remainingPercent = 38;
                    let processedFiles = 0;
                    let totalFilesEstimate = 0;
                    const timeout = setTimeout(() => { worker.terminate(); reject(new Error("Extract timeout")); }, 180000);
                    
                    worker.addEventListener('message', async (e) => {
                        const { type, taskId: tid, files, progress, error } = e.data;
                        if(tid !== taskId) return;
                        
                        if(type === 'batch') {
                            if(totalFilesEstimate === 0 && progress > 0) {
                                totalFilesEstimate = Math.round(100 / progress);
                            }
                            
                            for(const { name, data } of files) {
                                const blobUrl = URL.createObjectURL(data);
                                resourceCache.set(name, blobUrl);
                                
                                const cacheKey = `resources/${name}`;
                                const cachedResponse = await getCachedResponse(cacheKey);
                                if(!cachedResponse && cacheAvailable) {
                                    try {
                                        const cache = await caches.open(CACHE_NAME);
                                        const response = new Response(data, {
                                            headers: { 'Content-Type': 'application/octet-stream' }
                                        });
                                        await cache.put(cacheKey, response);
                                    } catch {}
                                }
                                
                                processedFiles++;
                            }
                            
                            const extractProgress = (processedFiles / (totalFilesEstimate || 1)) * remainingPercent;
                            setProgress(startPercent + extractProgress);
                            
                            await yieldMain();
                            
                        } else if(type === 'complete') {
                            clearTimeout(timeout);
                            worker.terminate();
                            setProgress(startPercent + remainingPercent);
                            extractingComplete = true;
                            if(window.statusInterval) {
                                clearInterval(window.statusInterval);
                                window.statusInterval = null;
                            }
                            statusText.style.opacity = '0';
                            resolve();
                        } else if(type === 'error') {
                            clearTimeout(timeout);
                            worker.terminate();
                            reject(new Error(error));
                        }
                    });
                    
                    worker.postMessage({ zipBlob: blob, taskId, batchSize: 2 });
                });
            };
            
            const directDownloadAndExtract = async () => {
                const cachedZip = await getCachedResponse('resources.zip');
                let response;
                
                if(cachedZip) {
                    response = cachedZip;
                    const blob = await cachedZip.blob();
                    const total = blob.size;
                    let loaded = 0;
                    const reader = blob.stream().getReader();
                    const chunks = [];
                    
                    while(true) {
                        const {done, value} = await reader.read();
                        if(done) break;
                        chunks.push(value);
                        loaded += value.length;
                        setProgress((loaded / total) * 60);
                        if(chunks.length % 60 === 0) await yieldMain();
                    }
                    const zipBlob = new Blob(chunks);
                    setProgress(60);
                    await extractZipWithWorker(zipBlob, 60);
                    URL.revokeObjectURL(URL.createObjectURL(zipBlob));
                } else {
                    response = await fetch('resources.zip', { cache: 'no-cache' });
                    await cacheResponse('resources.zip', response);
                    
                    const total = parseInt(response.headers.get('Content-Length') || '0', 10);
                    let loaded = 0;
                    const chunks = [];
                    const reader = response.body.getReader();
                    
                    while(true) {
                        const {done, value} = await reader.read();
                        if(done) break;
                        chunks.push(value);
                        loaded += value.length;
                        if(total > 0) setProgress((loaded / total) * 60);
                        if(chunks.length % 60 === 0) await yieldMain();
                    }
                    const zipBlob = new Blob(chunks);
                    setProgress(60);
                    await extractZipWithWorker(zipBlob, 60);
                    URL.revokeObjectURL(URL.createObjectURL(zipBlob));
                }
            };
            
            const setupInterceptor = () => {
                const origFetch = window.fetch;
                window.fetch = async (input, init) => {
                    if(typeof input === 'string' && input.startsWith('resources/')) {
                        const name = input.split('/').pop();
                        const cachedBlob = resourceCache.get(name);
                        if(cachedBlob) return origFetch(cachedBlob, init);
                        if(cacheAvailable) {
                            const cached = await getCachedResponse(input);
                            if(cached) return cached;
                        }
                    }
                    return origFetch(input, init);
                };
                
                const origOpen = XMLHttpRequest.prototype.open;
                XMLHttpRequest.prototype.open = function(method, url) {
                    if(url && url.startsWith('resources/')) {
                        const name = url.split('/').pop();
                        const cached = resourceCache.get(name);
                        if(cached) arguments[1] = cached;
                    }
                    return origOpen.apply(this, arguments);
                };
                
                const media = [HTMLImageElement, HTMLAudioElement, HTMLVideoElement];
                for(const T of media) {
                    const desc = Object.getOwnPropertyDescriptor(T.prototype, 'src');
                    if(desc?.set) {
                        Object.defineProperty(T.prototype, 'src', {
                            set: function(v) {
                                if(typeof v === 'string' && v.startsWith('resources/')) {
                                    const name = v.split('/').pop();
                                    const cached = resourceCache.get(name);
                                    if(cached) v = cached;
                                }
                                desc.set.call(this, v);
                            }
                        });
                    }
                }
            };
            
            const launchGame = () => {
                if(started) return;
                started = true;
                setupInterceptor();
                
                const script = document.createElement('script');
                script.src = 'Runtime.js';
                script.onload = () => {
                    hideLoader();
                    if(typeof Runtime !== 'undefined') {
                        new Runtime("MMFCanvas", RUNTIME);
                    }
                };
                document.head.appendChild(script);
            };
            
            const main = async () => {
                setProgress(0);
                await initCache();
                
                try {
                    const hasParts = await fetch(ABS_PART_URLS[0], { method: 'HEAD', cache: 'no-cache' }).catch(() => null);
                    
                    if(hasParts?.ok) {
                        const zipBlob = await mergePartsWithWorker(ABS_PART_URLS, (p) => setProgress(p));
                        setProgress(60);
                        await extractZipWithWorker(zipBlob, 60);
                        URL.revokeObjectURL(URL.createObjectURL(zipBlob));
                    } else {
                        await directDownloadAndExtract();
                    }
                    
                    setProgress(100);
                    await sleep(200);
                    launchGame();
                    
                } catch(e) {
                    console.error(e);
                    try {
                        await directDownloadAndExtract();
                        setProgress(100);
                        await sleep(200);
                        launchGame();
                    } catch(err) {
                        console.error(err);
                        setProgress(100);
                        setTimeout(() => launchGame(), 500);
                    }
                }
            };
            
            main();
        })();
    </script>
</body>

</html>
